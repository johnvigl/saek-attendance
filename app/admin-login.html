<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Σύνδεση Διαχειριστή</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="page-admin-login">
<div class="card">
    <h2>Σύνδεση Διαχειριστή</h2>
    <input type="email" id="email" placeholder="admin" value="admin">
    <input type="password" id="password" placeholder="admin">
    <button id="loginBtn">Σύνδεση</button>
    <div id="errorMsg" class="error"></div>
</div>
<script>
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
                credentials: 'include'
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                const err = await res.json();
                document.getElementById('errorMsg').innerText = err.detail || 'Λάθος στοιχεία';
            }
        } catch(e) { console.error(e); }
    };
</script>
</body>
</html>
