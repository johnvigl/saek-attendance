<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Απουσιολόγιο - ΣΑΕΚ</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="page-user-login">
<div class="card">
    <div style="text-align: center; margin-bottom: 1rem;">
        <img src="/static/logo.png" alt="Λογότυπο ΣΑΕΚ" style="max-width: 200px; width: 100%; height: auto;">
    </div>
    <h2 style="text-align: center;">Απουσιολόγιο</h2>
    <input type="email" id="email" placeholder="Διεύθυνση email" autocomplete="email">
    <input type="text" id="otp" class="hidden" placeholder="Εισάγετε τον κωδικό που λάβατε" autocomplete="off">
    <button id="actionBtn">Αποστολή κωδικού OTP</button>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let pendingEmail = null;
        let step = 'email'; // 'email' or 'otp'

        const emailInput = document.getElementById('email');
        const otpInput = document.getElementById('otp');
        const actionBtn = document.getElementById('actionBtn');
        const errorMsg = document.getElementById('errorMsg');

        function showError(msg) {
            errorMsg.innerText = msg;
            setTimeout(() => errorMsg.innerText = '', 5000);
        }

        actionBtn.onclick = async () => {
            if (step === 'email') {
                // Step 1: Request OTP
                const email = emailInput.value.trim();
                if (!email) {
                    showError('Παρακαλώ εισάγετε το email σας.');
                    return;
                }
                if (!email.includes('@')) {
                    showError('Μη έγκυρη διεύθυνση email.');
                    return;
                }
                pendingEmail = email;
                actionBtn.disabled = true;
                actionBtn.innerText = 'Αποστολή...';
                try {
                    const res = await fetch('/auth/request-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email }),
                        credentials: 'include'
                    });
                    if (res.ok) {
                        // Switch to OTP step
                        step = 'otp';
                        emailInput.classList.add('hidden');
                        otpInput.classList.remove('hidden');
                        emailInput.value = '';
                        actionBtn.innerText = 'Σύνδεση';
                        errorMsg.innerText = '';
                    } else {
                        const err = await res.json();
                        showError(err.detail || 'Αποτυχία αποστολής OTP.');
                    }
                } catch(e) {
                    console.error(e);
                    showError('Σφάλμα δικτύου.');
                } finally {
                    actionBtn.disabled = false;
                }
            } else {
                // Step 2: Verify OTP
                const code = otpInput.value.trim();
                if (!code) {
                    showError('Εισάγετε τον κωδικό που λάβατε.');
                    return;
                }
                actionBtn.disabled = true;
                actionBtn.innerText = 'Επαλήθευση...';
                try {
                    const res = await fetch('/auth/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: pendingEmail, code }),
                        credentials: 'include'
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.role === 'instructor') {
                            window.location.href = '/teacher.html';
                        } else if (data.role === 'student') {
                            window.location.href = '/student.html';
                        } else {
                            window.location.href = '/';
                        }
                    } else {
                        const err = await res.json();
                        showError(err.detail || 'Λανθασμένος κωδικός.');
                    }
                } catch(e) {
                    console.error(e);
                    showError('Σφάλμα επαλήθευσης.');
                } finally {
                    actionBtn.disabled = false;
                }
            }
        };

        // Enter key support
        emailInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                actionBtn.click();
            }
        });

        otpInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                actionBtn.click();
            }
        });
    });
</script>
</body>
</html>
